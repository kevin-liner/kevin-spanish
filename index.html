<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mi Plan">
<title>Mi Plan 🇪🇸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f0ece6;
    --surface: #faf8f5;
    --card:    #ffffff;
    --navy:    #1e2d4e;
    --navy2:   #2d3f66;
    --blue:    #3d5a8a;
    --blue-dim: rgba(61,90,138,0.1);
    --green:   #2d6a4f;
    --green-bg: #e8f5ee;
    --text:    #1e2d4e;
    --muted:   #7a8499;
    --border:  #e4ddd5;
    --shadow:  0 1px 4px rgba(30,45,78,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    padding: env(safe-area-inset-top, 24px) 18px env(safe-area-inset-bottom, 40px);
    max-width: 440px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-top: 20px;
    margin-bottom: 28px;
  }
  .header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.3px;
    line-height: 1.1;
  }
  .header h1 em {
    font-style: italic;
    color: var(--blue);
  }
  .header-right { text-align: right; }
  .header-date { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 4px; }
  .header-greeting { font-size: 13px; color: var(--navy); font-weight: 500; margin-top: 2px; }

  /* ── Stats ── */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .stat-val {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 5px;
    font-weight: 600;
  }

  /* ── Progress ── */
  .progress-wrap {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 10px;
  }
  .progress-bar {
    background: var(--bg);
    border-radius: 100px;
    height: 5px;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--blue), var(--navy2));
    height: 100%;
    border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Section label ── */
  .section-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.9px;
    font-weight: 600;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* ── Tasks ── */
  .task-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 26px; }

  .task {
    background: var(--card);
    border-radius: 16px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 13px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: opacity 0.3s, border-color 0.3s;
  }
  .task.done {
    opacity: 0.5;
    border-color: var(--green);
    background: var(--green-bg);
  }

  .task-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--blue-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 2px; }
  .task-detail { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .task-btns { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }

  .btn-go {
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    letter-spacing: 0.1px;
  }
  .btn-go:hover { background: var(--navy2); }

  .btn-check {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    letter-spacing: 0.1px;
  }
  .task.done .btn-check {
    background: var(--green-bg);
    color: var(--green);
    border-color: var(--green);
  }

  /* ── Vocab ── */
  .vocab-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 32px;
  }
  .vocab-card {
    background: var(--card);
    border-radius: 12px;
    padding: 12px 13px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .vocab-es {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--blue);
    font-style: italic;
  }
  .vocab-en { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding-bottom: 8px;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Mi Plan <em>🇪🇸</em></h1>
    <div class="header-greeting" id="greeting">Hola, Kevin</div>
  </div>
  <div class="header-right">
    <div class="header-date" id="dateDisplay"></div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="statWeek">1</div><div class="stat-label">Week</div></div>
  <div class="stat"><div class="stat-val" id="statStreak">0</div><div class="stat-label">Streak 🔥</div></div>
  <div class="stat"><div class="stat-val" id="statDays">91</div><div class="stat-label">Days Left</div></div>
</div>

<div class="progress-wrap">
  <div class="progress-header"><span id="progLabel">Week 1 of 12</span><span id="progPct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="section-label">Today's Plan</div>
<div class="task-list" id="taskList"></div>

<div class="section-label">This Week's Vocab</div>
<div class="vocab-grid" id="vocabGrid"></div>

<div class="footer">September 23, 2026 — ¡Tú puedes!</div>

<script>
const START = new Date('2026-06-23T00:00:00');
const END   = new Date('2026-09-23T00:00:00');
const TOTAL = Math.round((END - START) / 864e5);

const VOCAB = {
  1:  [['llamarse','to be called'],['ser','to be (perm.)'],['estar','to be (temp.)'],['tener','to have'],['vivir','to live'],['trabajar','to work'],['hablar','to speak'],['querer','to want'],['poder','can'],['ir','to go']],
  2:  [['madre','mother'],['padre','father'],['hermano','brother'],['hermana','sister'],['esposo','husband'],['esposa','wife'],['hijo','son'],['hija','daughter'],['mayor','older'],['menor','younger']],
  3:  [['despertarse','to wake up'],['levantarse','to get up'],['ducharse','to shower'],['desayunar','to breakfast'],['almorzar','to lunch'],['cenar','to have dinner'],['siempre','always'],['nunca','never'],['a veces','sometimes'],['normalmente','usually']],
  4:  [['comer','to eat'],['beber','to drink'],['pedir','to order'],['gustar','to like'],['encantar','to love'],['probar','to try'],['cocinar','to cook'],['comida','food'],['restaurante','restaurant'],['cuenta','the bill']],
  5:  [['ir','to go'],['venir','to come'],['llegar','to arrive'],['salir','to leave'],['doblar','to turn'],['seguir','to continue'],['calle','street'],['esquina','corner'],['metro','subway'],['parada','stop']],
  6:  [['ayer','yesterday'],['anoche','last night'],['la semana pasada','last week'],['fui','I went'],['vine','I came'],['hice','I did'],['dije','I said'],['tuve','I had'],['estuve','I was'],['vi','I saw']],
  7:  [['cuando era niño','when I was a child'],['antes','before'],['era','I was'],['tenía','I had'],['vivía','I lived'],['iba','I used to go'],['quería','I wanted'],['podía','I could'],['hacía','I used to do'],['veía','I used to see']],
  8:  [['futuro','future'],['meta','goal'],['esperar','to hope'],['pensar','to plan'],['voy a',"I'm going to"],['próximo','next'],['pronto','soon'],['algún día','someday'],['tener ganas de','to feel like'],['soñar con','to dream of']],
  9:  [['creer','to believe'],['pensar','to think'],['parecer','to seem'],['dudar','to doubt'],['opinión','opinion'],['quizás','maybe'],['depende','it depends'],['estoy de acuerdo','I agree'],['no creo que',"I don't think"],['me parece que','it seems to me']],
  10: [['trabajo','work'],['reunión','meeting'],['jefe','boss'],['proyecto','project'],['plazo','deadline'],['porque','because'],['aunque','although'],['sin embargo','however'],['por eso','therefore'],['además','also']],
  11: [['sentir','to feel'],['alegrarse','to be happy'],['preocuparse','to worry'],['enojarse','to get angry'],['amor','love'],['amistad','friendship'],['confianza','trust'],['dijo que','he/she said that'],['me pidió que','he/she asked me to'],['perdón','forgiveness']],
  12: [],
};

const SCHED = {
  audio:   new Set([1,2,3,4]),
  content: new Set([1,3,5]),
  reading: new Set([2,4]),
};

function loadState() { try { return JSON.parse(localStorage.getItem('sp_state') || '{}'); } catch { return {}; } }
function saveState(s) { localStorage.setItem('sp_state', JSON.stringify(s)); }
function todayKey() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function weekNum() { const days = Math.floor((new Date() - START) / 864e5); return Math.min(12, Math.max(1, Math.floor(days / 7) + 1)); }
function daysLeft() { return Math.max(0, Math.ceil((END - new Date()) / 864e5)); }
function progressPct() { return Math.min(100, Math.round((Math.round((new Date() - START) / 864e5) / TOTAL) * 100)); }

function tasksForToday(dow, state) {
  const ep  = state.ltEp  || 1;
  const ext = state.extEp || 1;
  const tasks = [];
  if (SCHED.audio.has(dow))   tasks.push({ id:'audio',   icon:'🎧', name:'Language Transfer',   detail:`Episode ${ep} of 40 — ~15 min`,  url:'https://www.languagetransfer.org/courses#complete-spanish', btn:'Listen' });
  if (SCHED.content.has(dow)) tasks.push({ id:'content', icon:'📺', name:'Extra en Español',     detail:`Episode ${ext} — ~25 min`,       url:'https://www.youtube.com/playlist?list=PLiSXvPiNzG5Ip24ZY75Zy23HAoMIokOfy', btn:'Watch' });
  if (SCHED.reading.has(dow)) tasks.push({ id:'reading', icon:'📰', name:'News in Slow Spanish', detail:'Beginner level — ~10 min',       url:'https://www.newsinslow.com/learn-spanish/', btn:'Read' });
  tasks.push({ id:'mily', icon:'💬', name:'Spanish with Mily', detail:'Answer her question of the day', url:null, btn:null });
  return tasks;
}

window.markDone = function(id) {
  const state = loadState();
  const key = todayKey();
  if (!state.done) state.done = {};
  if (!state.done[key]) state.done[key] = [];
  if (state.done[key].includes(id)) return;
  state.done[key].push(id);
  if (id === 'audio')   state.ltEp  = (state.ltEp  || 1) + 1;
  if (id === 'content') state.extEp = (state.extEp || 1) + 1;
  const dow = new Date().getDay();
  const allIds = tasksForToday(dow, state).map(t => t.id);
  if (allIds.every(t => state.done[key].includes(t))) {
    const yest = new Date(); yest.setDate(yest.getDate()-1);
    const yk = `${yest.getFullYear()}-${String(yest.getMonth()+1).padStart(2,'0')}-${String(yest.getDate()).padStart(2,'0')}`;
    state.streak = ((state.done[yk] && state.done[yk].length > 0) ? (state.streak || 0) : 0) + 1;
  }
  saveState(state); render();
};

function render() {
  const state = loadState();
  const now = new Date();
  const dow = now.getDay();
  const wk  = weekNum();
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateDisplay').textContent = `${DAYS[dow]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
  const hr = now.getHours();
  document.getElementById('greeting').textContent = (hr < 12 ? 'Buenos días' : hr < 18 ? 'Buenas tardes' : 'Buenas noches') + ', Kevin';
  document.getElementById('statWeek').textContent   = wk;
  document.getElementById('statStreak').textContent = state.streak || 0;
  document.getElementById('statDays').textContent   = daysLeft();
  const pct = progressPct();
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent  = pct + '%';
  document.getElementById('progLabel').textContent = `Week ${wk} of 12`;
  const tasks    = tasksForToday(dow, state);
  const doneKeys = (state.done && state.done[todayKey()]) || [];
  document.getElementById('taskList').innerHTML = tasks.map(t => {
    const done = doneKeys.includes(t.id);
    return `<div class="task ${done?'done':''}">
      <div class="task-icon">${t.icon}</div>
      <div class="task-body"><div class="task-name">${t.name}</div><div class="task-detail">${t.detail}</div></div>
      <div class="task-btns">
        ${t.url ? `<a href="${t.url}" target="_blank" class="btn-go">${t.btn}</a>` : ''}
        <button class="btn-check" onclick="markDone('${t.id}')">${done ? '✓ Done' : 'Mark Done'}</button>
      </div>
    </div>`;
  }).join('');
  const vocab = VOCAB[wk] || VOCAB[1];
  document.getElementById('vocabGrid').innerHTML = vocab.map(([es,en]) =>
    `<div class="vocab-card"><div class="vocab-es">${es}</div><div class="vocab-en">${en}</div></div>`
  ).join('');
}

render();
setInterval(render, 60000);
</script>
</body>
</html>
